services:
  - type: web
    name: ai-agriculture
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/chatbot-server.cjs
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
